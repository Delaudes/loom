<div class="min-h-screen bg-zinc-950 flex flex-col relative overflow-hidden">

  <div class="absolute inset-0 opacity-[0.04]"
    style="background-image: linear-gradient(rgba(255,255,255,1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,1) 1px, transparent 1px); background-size: 48px 48px;">
  </div>

  <header class="relative z-10 flex items-center justify-between px-6 pt-8 pb-6">
    <h1 class="text-2xl sm:text-3xl font-thin tracking-[0.4em] pl-[0.4em] text-white uppercase">Loom</h1>
    <div class="flex items-center gap-2">
      <app-back-home></app-back-home>
      <app-share-game></app-share-game>
      <app-game-rules></app-game-rules>
    </div>
  </header>

  <div class="w-full h-px bg-zinc-900 relative z-10"></div>

  <main class="relative z-10 flex flex-1 items-center justify-center p-6">
    @if (gameView.gameViewModel.get().isLoadingFetch) {
      <div class="w-5 h-5 border border-zinc-600 border-t-zinc-300 rounded-full animate-spin"></div>
    } @else if (gameView.gameViewModel.get().isErrorFetch) {
      <div class="flex flex-col items-center gap-5">
        <button
          (click)="fetchGameUseCase.execute()"
          class="px-8 py-2.5 border border-zinc-700 text-zinc-400 text-xs tracking-[0.2em] uppercase hover:border-zinc-400 hover:text-white transition-all duration-300 cursor-pointer">
          Réessayer
        </button>
        <p class="text-[0.65rem] tracking-[0.15em] text-red-400/70 uppercase text-center">Une erreur est survenue lors du chargement de la partie</p>
      </div>
    } @else {
      <app-game-board></app-game-board>
    }
  </main>

</div>
