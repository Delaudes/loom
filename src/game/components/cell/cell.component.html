<button
  (click)="playCellUseCase.execute(cell().x, cell().y)"
  class="w-10 h-10 sm:w-11 sm:h-11 border-r border-b border-zinc-500 flex items-center justify-center transition-colors duration-200 group"
  [class.bg-zinc-900]="!cell().isInPlayerLargestTerritory && !cell().isInOpponentLargestTerritory"
  [class.bg-zinc-600]="cell().isInPlayerLargestTerritory"
  [class.bg-amber-900]="cell().isInOpponentLargestTerritory"
  [class.cursor-pointer]="cell().canPlay"
  [class.cursor-default]="!cell().canPlay"
  [class.hover:bg-zinc-800]="cell().canPlay"
>
  @switch (cell().owner) {
    @case (OwnerViewEnum.Player) {
      <img src="/player-token.svg" class="w-6 h-6" />
    }
    @case (OwnerViewEnum.Opponent) {
      <img src="/opponent-token.svg" class="w-6 h-6" />
    }
    @default {
      @if (cell().isPlayedInCurrentRound) {
        <img src="/player-token.svg" class="w-6 h-6 opacity-25" />
      }
    }
  }
</button>
