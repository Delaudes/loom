<button
  (click)="playCellUseCase.execute(cell().x, cell().y)"
  class="w-10 h-10 sm:w-11 sm:h-11 border-r border-b border-zinc-500 flex items-center justify-center transition-colors duration-200 group"
  [class.bg-zinc-900]="!cell().isInPlayerLargestTerritory && !cell().isInOpponentLargestTerritory"
  [class.bg-sky-400/20]="cell().isInPlayerLargestTerritory"
  [class.bg-amber-400/20]="cell().isInOpponentLargestTerritory"
  [class.cursor-pointer]="cell().canPlay"
  [class.cursor-default]="!cell().canPlay"
  [class.hover:bg-zinc-800]="cell().canPlay"
>
  @switch (cell().owner) {
    @case (OwnerViewEnum.Player) {
      <img src="/player-token.svg" class="w-6 h-6" />
    }
    @case (OwnerViewEnum.Opponent) {
      <img src="/opponent-token.svg" class="w-6 h-6" />
    }
    @default {
      @switch (cell().currentRoundAction) {
        @case (CurrentRoundActionViewEnum.Place1) {
          <div class="w-5 h-5 rounded-full border border-sky-500 flex items-center justify-center text-[0.5rem] leading-none text-sky-300">1</div>
        }
        @case (CurrentRoundActionViewEnum.Place2) {
          <div class="w-5 h-5 rounded-full border border-sky-500 flex items-center justify-center text-[0.5rem] leading-none text-sky-300">2</div>
        }
        @case (CurrentRoundActionViewEnum.Place3) {
          <div class="w-5 h-5 rounded-full border border-sky-500 flex items-center justify-center text-[0.5rem] leading-none text-sky-300">3</div>
        }
        @case (CurrentRoundActionViewEnum.Predict1) {
          <div class="w-5 h-5 rounded-full border border-violet-500 flex items-center justify-center text-[0.5rem] leading-none text-violet-300">1</div>
        }
        @case (CurrentRoundActionViewEnum.Predict2) {
          <div class="w-5 h-5 rounded-full border border-violet-500 flex items-center justify-center text-[0.5rem] leading-none text-violet-300">2</div>
        }
      }
    }
  }
</button>
