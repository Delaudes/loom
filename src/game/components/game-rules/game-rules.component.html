<button
  (click)="dialog.showModal()"
  class="flex items-center justify-center w-9 h-9 border border-zinc-700 text-zinc-400 hover:border-zinc-400 hover:text-white transition-all duration-300 cursor-pointer">
  <span class="material-symbols-outlined shrink-0"
    style="font-size:1rem; font-variation-settings:'wght' 300">info</span>
</button>

<dialog #dialog
  class="bg-zinc-900 border border-zinc-800 p-8 w-80 text-center m-auto backdrop:bg-black/60">
  <h2 class="text-sm font-thin tracking-[0.3em] text-white uppercase mb-4">Règles du jeu</h2>
  <div class="w-6 h-px bg-zinc-700 mx-auto mb-6"></div>
  <div class="flex flex-col gap-4 mb-8">
    <p class="text-zinc-300 text-xs tracking-[0.12em] uppercase">Placez et prédisez à chaque tour</p>
    <p class="text-zinc-300 text-xs tracking-[0.12em] uppercase">Construisez votre territoire</p>
    <p class="text-zinc-300 text-xs tracking-[0.12em] uppercase">La plus grande zone l'emporte</p>
  </div>
  <button
    (click)="dialog.close()"
    class="px-8 py-2.5 border border-zinc-700 text-zinc-400 text-xs tracking-[0.2em] uppercase hover:border-zinc-400 hover:text-white transition-all duration-300 cursor-pointer">
    Fermer
  </button>
</dialog>
