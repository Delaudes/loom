<div class="flex flex-col items-center gap-3">

  <div class="flex flex-col">

    <div class="flex ml-5">
      @for (label of colLabels; track $index) {
        <div class="w-10 sm:w-11 flex items-center justify-center text-[0.6rem] tracking-[0.2em] text-zinc-400">
          {{ label }}
        </div>
      }
    </div>

    <div class="flex">
      <div class="flex flex-col">
        @for (label of rowLabels; track $index) {
          <div class="w-5 h-10 sm:h-11 flex items-center justify-center text-[0.6rem] tracking-[0.2em] text-zinc-400">
            {{ label }}
          </div>
        }
      </div>

      <div class="overflow-hidden select-none">
        <div
          class="inline-flex flex-col border-t border-l border-zinc-500"
          [style.transform]="'translate(' + tx.get() + 'px, ' + ty.get() + 'px)'"
          [style.transition]="animated.get() ? 'transform 200ms ease-in-out' : 'none'"
        >
          @for (row of shiftedCells; track $index) {
            <div class="flex">
              @for (cell of row; track $index) {
                <app-cell [cell]="cell"></app-cell>
              }
            </div>
          }
        </div>
      </div>
    </div>

  </div>

  <div class="grid grid-cols-3 gap-1 p-2 rounded-xl border border-zinc-800 bg-zinc-950/50">
    <div></div>
    <button (click)="shiftUp()" class="w-10 h-10 flex items-center justify-center rounded-lg border border-zinc-700 bg-zinc-900 text-zinc-400 hover:bg-zinc-800 hover:border-zinc-500 hover:text-zinc-200 active:bg-zinc-700 transition-colors cursor-pointer">
      <svg viewBox="0 0 24 24" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="5 15 12 8 19 15"/>
      </svg>
    </button>
    <div></div>

    <button (click)="shiftLeft()" class="w-10 h-10 flex items-center justify-center rounded-lg border border-zinc-700 bg-zinc-900 text-zinc-400 hover:bg-zinc-800 hover:border-zinc-500 hover:text-zinc-200 active:bg-zinc-700 transition-colors cursor-pointer">
      <svg viewBox="0 0 24 24" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 5 8 12 15 19"/>
      </svg>
    </button>
    <div class="w-10 h-10 flex items-center justify-center">
      <div class="w-2 h-2 rounded-full bg-zinc-800 border border-zinc-700"></div>
    </div>
    <button (click)="shiftRight()" class="w-10 h-10 flex items-center justify-center rounded-lg border border-zinc-700 bg-zinc-900 text-zinc-400 hover:bg-zinc-800 hover:border-zinc-500 hover:text-zinc-200 active:bg-zinc-700 transition-colors cursor-pointer">
      <svg viewBox="0 0 24 24" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 5 16 12 9 19"/>
      </svg>
    </button>

    <div></div>
    <button (click)="shiftDown()" class="w-10 h-10 flex items-center justify-center rounded-lg border border-zinc-700 bg-zinc-900 text-zinc-400 hover:bg-zinc-800 hover:border-zinc-500 hover:text-zinc-200 active:bg-zinc-700 transition-colors cursor-pointer">
      <svg viewBox="0 0 24 24" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="5 9 12 16 19 9"/>
      </svg>
    </button>
    <div></div>
  </div>

</div>
