<main class="min-h-screen bg-zinc-950 flex flex-col items-center justify-center px-8 relative overflow-hidden">

  <div class="absolute inset-0 opacity-[0.04]"
    style="background-image: linear-gradient(rgba(255,255,255,1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,1) 1px, transparent 1px); background-size: 48px 48px;">
  </div>

  <div class="relative z-10 flex flex-col items-center text-center">

    <h1 class="text-6xl sm:text-8xl font-thin text-white uppercase flex items-center pl-[0.4em] mb-5">
      <span class="tracking-[0.4em]">L</span>
      <svg viewBox="0 0 20 20" class="h-[0.68em] w-auto ml-[0.15em] mr-[0.4em] shrink-0">
        <circle cx="10" cy="10" r="9" fill="#e8e8e8"/>
        <circle cx="7.5" cy="7.5" r="3.5" fill="rgba(255,255,255,0.85)"/>
        <circle cx="11" cy="12" r="4.5" fill="rgba(180,180,180,0.18)"/>
        <circle cx="10" cy="10" r="9" fill="none" stroke="rgba(0,0,0,0.07)" stroke-width="0.7"/>
      </svg>
      <svg viewBox="0 0 20 20" class="h-[0.68em] w-auto mr-[0.4em] shrink-0">
        <circle cx="10" cy="10" r="9" fill="#f59e0b"/>
        <circle cx="7.5" cy="7.5" r="3.5" fill="rgba(255,218,66,0.55)"/>
        <circle cx="11" cy="12" r="4.5" fill="rgba(160,90,0,0.16)"/>
        <circle cx="10" cy="10" r="9" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="0.7"/>
      </svg>
      <span class="tracking-[0.4em]">M</span>
    </h1>

    <div class="w-8 h-px bg-zinc-600 mb-6"></div>

    <p class="text-zinc-400 text-[0.65rem] tracking-[0.2em] uppercase mb-14 whitespace-nowrap">
      Stratégie · 1 contre 1
    </p>

    <div class="flex flex-col gap-6 mb-14 w-full max-w-xs">
      <div class="flex items-center gap-4">
        <span class="material-symbols-outlined text-zinc-400 shrink-0"
          style="font-size:1.1rem; font-variation-settings:'wght' 300">grid_4x4</span>
        <span class="text-zinc-300 text-xs tracking-[0.12em] uppercase text-left">Placez et prédisez à chaque tour</span>
      </div>
      <div class="flex items-center gap-4">
        <span class="material-symbols-outlined text-zinc-400 shrink-0"
          style="font-size:1.1rem; font-variation-settings:'wght' 300">select_all</span>
        <span class="text-zinc-300 text-xs tracking-[0.12em] uppercase text-left">Construisez votre territoire</span>
      </div>
      <div class="flex items-center gap-4">
        <span class="material-symbols-outlined text-zinc-400 shrink-0"
          style="font-size:1.1rem; font-variation-settings:'wght' 300">military_tech</span>
        <span class="text-zinc-300 text-xs tracking-[0.12em] uppercase text-left">La plus grande zone l'emporte</span>
      </div>
    </div>

    <app-start-game></app-start-game>

  </div>

</main>
